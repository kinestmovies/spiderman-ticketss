<!DOCTYPE html>
<html>
<head>
  <title>Spiderman Ticket Validation</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding-top: 80px;
      background: #0f172a;
      color: white;
    }
    .valid { color: #22c55e; font-size: 40px; }
    .invalid { color: #ef4444; font-size: 40px; }
  </style>
</head>
<body>

<h1>🕷️ Kine's Spiderman Movie Ticket</h1>
<h2 id="ticket"></h2>
<p id="status"></p>

<script>
  const params = new URLSearchParams(window.location.search);
  const ticket = params.get("id");

  const validTickets = [
    "SPID001","SPID002","SPID003","SPID004","SPID005",
    "SPID006","SPID007","SPID008","SPID009","SPID010",
    "SPID011","SPID012","SPID013","SPID014","SPID015",
    "SPID016","SPID017","SPID018","SPID019","SPID020",
    "SPID021","SPID022","SPID023","SPID024","SPID025",
    "SPID026","SPID027","SPID028","SPID029","SPID030",
    "SPID031","SPID032","SPID033","SPID034","SPID035",
    "SPID036","SPID037","SPID038","SPID039","SPID040",
    "SPID041","SPID042","SPID043","SPID044","SPID045",
    "SPID046","SPID047","SPID048","SPID049","SPID050"
  ];

  document.getElementById("ticket").innerText = "Ticket ID: " + ticket;

  if (validTickets.includes(ticket)) {
    document.getElementById("status").innerHTML = "✅ VALID";
    document.getElementById("status").className = "valid";
  } else {
    document.getElementById("status").innerHTML = "❌ INVALID";
    document.getElementById("status").className = "invalid";
  }
</script>

</body>
</html>
